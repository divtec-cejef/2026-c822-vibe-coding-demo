name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/configure-pages@v5

      # Le site est statique : on uploade la racine en excluant l'outillage dev.
      - name: Prepare artifact directory
        run: |
          mkdir -p _site
          rsync -a --delete \
            --exclude='_site' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='node_modules' \
            --exclude='tests' \
            --exclude='ressources' \
            --exclude='playwright.config.js' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='playwright-report' \
            --exclude='test-results' \
            ./ _site/

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
